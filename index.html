<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bir şey soracağım 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ffd6e7,#ffeaf3);
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* başlangıç */

.start h1{
font-family:'Great Vibes';
font-size:50px;
color:#d63384;
min-height:70px;
}

.startButtons{
margin-top:20px;
}

.startYes,.startNo{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:14px;
margin:10px;
cursor:pointer;
}

.startYes{background:#28a745;color:white;}
.startNo{background:#dc3545;color:white;}

/* ana ekran */

.container{
display:none;
}

.container h2{
font-family:'Great Vibes';
font-size:50px;
color:#d63384;
}

/* butonlar */

.buttons{
position:fixed;
bottom:120px;
left:50%;
transform:translateX(-50%);
z-index:9999;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:14px;
margin:10px;
cursor:pointer;
}

#yes{background:#28a745;color:white;}
#no{background:#dc3545;color:white;}

/* foto */

.photo{
position:absolute;
width:130px;
background:white;
padding:6px;
border-radius:8px;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
animation:rise 6s linear;
z-index:1;
}

.photo img{
width:100%;
border-radius:6px;
}

.caption{
font-size:11px;
}

@keyframes rise{

0%{transform:translateY(100vh) rotate(-10deg);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(-120vh) rotate(10deg);opacity:0;}

}

/* final box */

.final{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

font-family:'Great Vibes';
font-size:45px;
color:#d63384;

background:rgba(255,255,255,0.9);
backdrop-filter:blur(6px);

padding:30px 40px;
border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,0.25);

display:none;
z-index:99999;

}

/* kalpler */

.heart{
position:absolute;
font-size:28px;
animation:float 4s linear infinite;
}

@keyframes float{

0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-900px);opacity:0;}

}

</style>
</head>

<body>

<audio id="music" loop>
<source src="muzik.mp3" type="audio/mpeg">
</audio>

<!-- başlangıç -->

<div class="start" id="startScreen">

<h1 id="typeText"></h1>

<div class="startButtons">

<button class="startYes" onclick="startSite()">Evet</button>
<button class="startNo" onclick="startSite()">Sorucam kaçarın yok</button>

</div>

</div>

<!-- ana ekran -->

<div class="container" id="mainSite">

<h2>Barışalım mı? 🤍</h2>

<div class="buttons">

<button id="yes">Evet</button>
<button id="no">Hayır</button>

</div>

</div>

<div class="final" id="finalText">
Biliyodum barışacağını zaten 🤍
</div>

<script>

let music=document.getElementById("music")
let yesBtn=document.getElementById("yes")
let noBtn=document.getElementById("no")
let finalText=document.getElementById("finalText")

let grow=0

function startSite(){

document.getElementById("startScreen").style.display="none"
document.getElementById("mainSite").style.display="block"

music.play()

}

/* yazı animasyonu */

let text="Sana bir şey sorabilir miyim?"
let i=0

function typeWriter(){

if(i<text.length){

document.getElementById("typeText").innerHTML+=text.charAt(i)

i++

setTimeout(typeWriter,60)

}

}

typeWriter()

/* foto listesi */

let images=[
"1.jpeg","2.jpeg","3.jpeg","4.jpeg","5.jpeg","6.jpeg",
"7.jpeg","8.jpeg","9.jpeg","10.jpeg","11.jpeg","12.jpeg",
"13.jpeg","14.jpeg","15.jpeg","16.jpeg","17.jpeg","18.jpeg"
]

let texts=[
"Bir daha düşün bence 🙂",
"Buna da mı hayır diyeceksin?",
"Bak ne kadar tatlıyız 🤍",
"Tam emin misin?",
"Bence evet daha mantıklı",
"Hayır demek zorunda mısın ki",
"Bir şans daha ver bence",
"Bu fotoğrafa da mı hayır?"
]

/* hayır butonu */

noBtn.onclick=()=>{

grow+=20
yesBtn.style.fontSize=(18+grow)+"px"

/* sadece basınca yer değiştirir */

let x=Math.random()*(window.innerWidth-120)
let y=Math.random()*(window.innerHeight-200)

noBtn.style.position="fixed"
noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

showPhoto()

}

/* foto çıkar */

function showPhoto(){

let img=images[Math.floor(Math.random()*images.length)]
let text=texts[Math.floor(Math.random()*texts.length)]

let div=document.createElement("div")
div.className="photo"

div.style.left=Math.random()*80+"%"

div.innerHTML=`
<img src="${img}">
<div class="caption">${text}</div>
`

document.body.appendChild(div)

}

/* evet */

yesBtn.onclick=()=>{

document.getElementById("mainSite").style.display="none"

finalText.style.display="block"

startHearts()

}

/* kalpler */

function startHearts(){

setInterval(()=>{

let heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"%"

heart.style.bottom="-50px"

document.body.appendChild(heart)

},200)

}

</script>

</body>
</html>
